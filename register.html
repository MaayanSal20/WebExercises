<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold text-center mb-6">Register</h1>

        <form>
            <label class="block mb-2">Name</label>
            <input type="name" required 
                   class="w-full p-2 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">


            <label class="block mb-2">Email</label>
            <input type="email" required 
                   class="w-full p-2 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

            
            <label class="block mb-2">Password</label>
            <input type="password" required 
                   class="w-full p-2 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

            
            <label class="block mb-2">Confirm Password</label>
            <input type="password" required 
                   class="w-full p-2 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

            
            <label class="block mb-2">Birth Date</label>
            <input type="date" required 
                   class="w-full p-2 mb-6 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

           
            <button type="submit"
                class="w-full p-3 bg-blue-500 text-white rounded hover:bg-blue-600">
                Register
            </button>

           
            <a href="login.html"
               class="block text-center mt-4 text-blue-500 hover:underline">
                Already have an account? Login
            </a>

        </form>
    </div>

</body>
</html>
